#!ipxe
# Homelab overrides for netboot.xyz.
#
# Lands at /mnt/tank/system/pxe/config/menus/boot.cfg via ensure_file_on_nas
# (phase apps). netboot.xyz's menu.ipxe chain-loads this file first thing,
# so anything set here is live for the rest of the menu session.
#
# What this does:
#   * site_name     — decorates the top bar of the menu UI.
#   * custom_url    — tells menu.ipxe to surface the "Custom URL Menu"
#                     item in the main menu. Clicking that item chains
#                     ${custom_url}/custom.ipxe, which we serve from the
#                     netboot.xyz container's HTTP asset port (8080).
#   * boot_domain   — pin to boot.netboot.xyz/2.0.89 (versioned) so any
#                     fallback chain to ${boot_domain}/menu.ipxe hits the
#                     106-line versioned upstream which has no version_check
#                     section, instead of the 121-line root menu.ipxe which
#                     has :version_check and will auto-upgrade the iPXE
#                     binary to a 3.x build (iPXE 2.0.0+ — breaks USB KB on
#                     Intel xHCI per iPXE issue #1643). Without this,
#                     setting boot_domain = boot.netboot.xyz (rootless)
#                     pulls in the upgrade chain on the NEXT boot or
#                     sub-menu traversal.
#   * sigs_enabled  — false. menu.ipxe's :verify_sigs step tries imgverify
#                     on every chained sub-menu (utils-efi.ipxe, linux.ipxe,
#                     etc.) against ${sigs}${menu}.ipxe.sig. When upstream
#                     rotated the signing cert in 3.0.0, 2.0.89 .sig fetches
#                     started failing with EACCES ("permission denied") in
#                     iPXE. Disabling verification sidesteps the rotation
#                     mismatch entirely; the menu contents are already
#                     served from our own TFTP so the trust boundary is
#                     our NAS, not the upstream CDN.
#
# Why not override netboot.xyz's own /config/menus/remote/talos.ipxe:
# the container's init.sh re-extracts the menus tarball on every start
# if /config/menus/remote/menu.ipxe is absent, which would stomp any file
# we drop in there. /assets is our volume and isn't touched.

set site_name Homelab
set custom_url http://10.10.5.10:8080
set boot_domain boot.netboot.xyz/2.0.89
set sigs_enabled false
