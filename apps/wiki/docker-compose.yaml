# Static wiki host — serves the MkDocs-built `site/` from the wiki repo.
#
# Content pushed via rsync from the operator laptop:
#   cd ~/Documents/github/wiki && ./tools/deploy.sh
# which drops files at /mnt/tank/system/apps-config/wiki/site/. nginx
# serves read-only from that dir; no credentials, no DB, no admin surface.
#
# Fronted by Traefik (wiki.w1.lv → http://10.10.5.10:8088) — see
# apps/traefik/routes.yaml. nginx only binds on mgmt-VLAN IP.
services:
  wiki:
    image: nginx:1.27-alpine
    container_name: wiki
    restart: unless-stopped
    ports:
      # Mgmt VLAN bind only. Port 8088 picked clear of:
      # :3000 netboot-ui, :4480 meshcentral, :8080 tftp-http,
      # :9001 minio-prd-console, :9011 minio-dev-console.
      - "10.10.5.10:8088:80"
    volumes:
      - /mnt/tank/system/apps-config/wiki/site:/usr/share/nginx/html:ro
      - /mnt/tank/system/apps-config/wiki/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - default

networks:
  default:
    driver: bridge
