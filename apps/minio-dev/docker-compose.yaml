services:
  minio:
    image: minio/minio:latest
    container_name: minio-dev
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "10.10.15.10:9000:9000"     # S3 API
      - "10.10.15.10:9001:9001"     # Web console
    volumes:
      - /mnt/tank/kube/dev/velero:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_SERVER_URL=http://10.10.15.10:9000
      - MINIO_BROWSER_REDIRECT_URL=http://10.10.15.10:9001
    command: server /data --console-address ":9001"
