# Homepage service catalog — declarative.
# https://gethomepage.dev/configs/services/
#
# Each entry becomes a card. `siteMonitor` does an HTTP probe for up/down
# indicator; no credentials required. `widget:` stanzas that call service
# APIs (MinIO, TrueNAS, Traefik) are intentionally held out of MVP to
# avoid credential plumbing — added in a follow-up pass.
#
# ⚠️ WIKI MIRROR: Adding/removing a service here ALSO requires updating:
#   wiki/docs/architecture/hostnames.md  (admin / data / infra plane tables)
#   wiki/docs/reference/links.md         (dashboards table)

- Infrastructure:
    - MikroTik Router:
        icon: mikrotik.png
        href: http://10.10.0.1/
        description: "Router / firewall / DHCP / DNS"
        siteMonitor: http://10.10.0.1/
        ping: 10.10.0.1
        widget:
          type: mikrotik
          # HTTP not HTTPS: :443 on the router is closed in our config.
          # The REST API lives at /rest and takes HTTP basic auth.
          url: http://10.10.0.1
          username: "{{HOMEPAGE_VAR_MIKROTIK_USER}}"
          password: "{{HOMEPAGE_VAR_MIKROTIK_PASS}}"

    - NAS Traefik:
        icon: traefik.png
        href: https://traefik-nas.w1.lv/dashboard/
        description: "Mgmt-plane reverse proxy"
        # /api/http/routers returns JSON via api@internal — always 200
        # when Traefik is up. /ping would need --ping=true flag in compose;
        # /api works unauthenticated on Traefik v3 dashboards.
        siteMonitor: https://traefik-nas.w1.lv/api/http/routers
        widget:
          type: traefik
          url: https://traefik-nas.w1.lv

    - MeshCentral:
        icon: meshcentral.png
        href: https://mc.w1.lv/
        description: "AMT / KVM management (6 nodes)"
        # No siteMonitor — MeshCentral redirects every path to :4430
        # (a leftover from when it ran its own TLS; config.json's
        # TlsOffload should suppress this but doesn't take effect on
        # our install). Every redirect target :4430 has no listener,
        # so any Homepage probe reports 500. Clickable link works
        # correctly in the browser; just no dot status on the card.
        # Revisit when we fix MC's config.json TlsOffload behavior.

- NAS:
    - TrueNAS:
        icon: truenas-scale.png
        href: https://nas.w1.lv/
        description: "NAS management UI"
        siteMonitor: https://nas.w1.lv/
        widget:
          type: truenas
          url: https://nas.w1.lv
          key: "{{HOMEPAGE_VAR_TRUENAS_API_KEY}}"
          enablePools: true   # show tank pool size + health
          nasType: scale      # TrueNAS SCALE / Community Edition

    - PXE (netboot.xyz):
        icon: netbootxyz.png
        href: https://pxe.w1.lv/
        description: "PXE menu admin + Talos images"
        siteMonitor: https://pxe.w1.lv/

    - Internal Wiki:
        icon: mkdocs.png
        href: https://wiki.w1.lv/
        description: "Homelab + GIKS docs"
        siteMonitor: https://wiki.w1.lv/

- Storage:
    - MinIO prd Console:
        icon: minio.png
        href: https://minio-prd.w1.lv/
        description: "S3 admin — prd (Velero / workloads)"
        siteMonitor: https://minio-prd.w1.lv/
        # No widget: — Homepage v1.12 removed the native `minio` widget
        # type (gethomepage.dev/widgets/services/minio/ returns 404).
        # Live stats would need a customapi widget hitting MinIO's
        # Prometheus endpoint; not worth it until we instrument anyway.

    - MinIO dev Console:
        icon: minio.png
        href: https://minio-dev.w1.lv/
        description: "S3 admin — dev"
        siteMonitor: https://minio-dev.w1.lv/

    - MinIO prd S3:
        icon: minio.png
        href: "https://s3-prd.w1.lv:9000/"
        description: "S3 API (port 9000, data plane)"
        siteMonitor: "https://s3-prd.w1.lv:9000/minio/health/live"

    - MinIO dev S3:
        icon: minio.png
        href: "https://s3-dev.w1.lv:9000/"
        description: "S3 API (port 9000, data plane)"
        siteMonitor: "https://s3-dev.w1.lv:9000/minio/health/live"

