# nginx server block for the static wiki.
# Landed at /mnt/tank/system/apps-config/wiki/nginx.conf by phase apps via
# ensure_file_on_nas. Mounted read-only into the container at
# /etc/nginx/conf.d/default.conf.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # MkDocs emits "clean URL" paths like /architecture/ip-plan/ that map
    # to /architecture/ip-plan/index.html on disk. Serve them and fall
    # back to 404.html (MkDocs generates one).
    location / {
        try_files $uri $uri/ $uri/index.html /404.html;
    }

    # Static assets are content-hashed by mkdocs-material (e.g.
    # assets/javascripts/bundle.abc123.js) so stale caching is safe.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Hide nginx version in Server header.
    server_tokens off;

    # Healthcheck target used by docker-compose healthcheck and Traefik.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
