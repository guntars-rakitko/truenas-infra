# Homepage top-bar info widgets.
# https://gethomepage.dev/configs/service-widgets/

# NAS host CPU + memory. Homepage's `resources` widget reads /proc
# inside the homepage container — but in TrueNAS Docker /proc is
# un-namespaced, so cpu/memory numbers reflect the real NAS host, not
# the container. Labeled "NAS" so it's visually grouped with the NAS
# section below. (Homepage doesn't allow resources inside a service
# card, hence the top bar — but logically this IS the NAS resources.)
- resources:
    label: NAS
    cpu: true
    memory: true
    expanded: true

- datetime:
    text_size: xl
    format:
      timeStyle: short
      dateStyle: short
      hour12: false

- search:
    provider: custom
    url: https://wiki.w1.lv/?q=
    target: _blank
