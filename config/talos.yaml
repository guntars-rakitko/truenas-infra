# Talos PXE updater config — consumed by apps/pxe/talos-updater.sh
# via env vars set from `cronjob.command` in modules/apps.py.

# Version selection.
#   - "latest" → poll GitHub for the most-recent tag and track it.
#   - "vX.Y.Z" → pin to that exact release.
version: latest

# Retention — keep the newest N downloaded versions on disk, delete older.
# Takes effect AFTER a successful download (so if we drop from latest to a
# pin + retention=1, the previously-downloaded latest survives until a
# successful fetch of the pinned version).
retention: 5

# Architecture + platform baked into the generated iPXE menu entries.
architecture: amd64
platform: metal

# System extensions baked into the Talos factory schematic. Mirrored
# into apps/pxe/schematic.yaml (the canonical source the factory
# receives) — keep both in sync. Changes here WILL force a new schematic
# ID from factory.talos.dev on the next updater run (state file is
# regenerated), which triggers re-download of kernel + initramfs.
#
# Available extensions: https://github.com/siderolabs/extensions
extensions:
  # Graceful shutdown on UPS events. Pairs with the NUT server running on
  # this NAS at 10.10.5.10:3493 — each K8s node's nut-client monitors and
  # shuts down cleanly when the UPS reports a battery-low state.
  - siderolabs/nut-client
  # Intel microcode — K8s nodes are ASUS Q170S1 (all Intel), this fixes
  # erratum and reliability bugs on CPU generation N.
  - siderolabs/intel-ucode
  # gVisor — userland kernel for container sandboxing. Enables runsc as
  # an optional container runtime alongside runc.
  - siderolabs/gvisor
