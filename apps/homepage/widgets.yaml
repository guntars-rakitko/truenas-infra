# Homepage top-bar info widgets.
# https://gethomepage.dev/configs/service-widgets/

# Top-bar `resources` widget intentionally omitted.
# Homepage v1.12 only supports `resources` as a top-bar/group-header
# widget — not as a per-service card widget inside a group. The user's
# ask to "put host stats in the NAS widget" therefore isn't directly
# expressible. Best substitute: the TrueNAS widget on the `nas.w1.lv`
# card (services.yaml) already shows System Load, Uptime, Alerts, and
# `tank` pool free space — covers the same ground as a generic CPU/
# memory gauge, in the right place.

- datetime:
    text_size: xl
    format:
      timeStyle: short
      dateStyle: short
      hour12: false

- search:
    provider: custom
    url: https://wiki.w1.lv/?q=
    target: _blank
