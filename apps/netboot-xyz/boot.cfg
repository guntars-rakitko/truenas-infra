#!ipxe
# Homelab boot.cfg — runtime vars loaded by menu.ipxe (first thing it
# does, via `chain --autofree tftp://10.10.5.10/boot.cfg`).
#
# Must NOT `exit` or fall off the end with non-zero status — menu.ipxe
# expects chain-return so it can continue to :main.

set site_name Homelab

# Signature verification DISABLED. Our menu.ipxe and sub-menus are
# served from our own TFTP/HTTP, so the trust boundary is our NAS —
# not the upstream netboot.xyz CDN. Upstream rotated the image-
# signing cert in 3.0.0, and our pinned 2.0.89 iPXE binary (iPXE
# 1.21.1+) embeds the pre-rotation cert. Enabling sigs would fail
# every chained sub-menu with EACCES "permission denied".
set sigs_enabled false

# ${live_endpoint} + distro mirror URLs are consumed by upstream's
# utils-efi.ipxe / linux.ipxe / live.ipxe sub-menus (which we chain
# directly from menu.ipxe — they already exist on TFTP, extracted by
# the container's init.sh from the 2.0.89 menus tarball).
#
# These are copied verbatim from upstream netboot.xyz 2.0.89's
# boot.cfg — keep in sync if we bump MENU_VERSION in docker-compose.

set live_endpoint       https://github.com/netbootxyz

set almalinux_mirror    http://repo.almalinux.org
set almalinux_base_dir  almalinux
set alpinelinux_mirror  http://dl-cdn.alpinelinux.org
set alpinelinux_base_dir alpine
set archlinux_mirror    mirrors.kernel.org
set archlinux_base_dir  archlinux
set centos_mirror       https://mirror.stream.centos.org
set centos_base_dir
set debian_mirror       http://deb.debian.org
set debian_base_dir     debian
set devuan_mirror       http://deb.devuan.org
set devuan_base_dir     devuan
set fedora_mirror       http://mirrors.kernel.org
set fedora_base_dir     fedora
set coreos_mirror       https://builds.coreos.fedoraproject.org
set coreos_base_dir     prod/streams
set ipfire_mirror       https://downloads.ipfire.org
set ipfire_base_dir     releases/ipfire-2.x
set kali_mirror         http://http.kali.org
set kali_base_dir       kali
set opensuse_mirror     http://download.opensuse.org
set opensuse_base_dir   distribution/leap
set rockylinux_mirror   http://download.rockylinux.org
set rockylinux_base_dir pub/rocky
set ubuntu_mirror       http://archive.ubuntu.com
set ubuntu_base_dir     ubuntu

# Menu item toggles used by upstream sub-menus. Keep in sync with
# the items we actually chain from menu.ipxe.
set menu_linux    1
set menu_live     1
set menu_utils    1
set menu_bsd      0
set menu_unix     0
set menu_freedos  0
set menu_windows  0
set menu_pci      0
