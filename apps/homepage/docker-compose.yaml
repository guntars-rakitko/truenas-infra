# Homepage — declarative-only service dashboard at https://home.w1.lv/.
#
# Aggregates every homelab service into a single admin-plane view. No
# Docker-socket auto-discovery (that pattern would require mounting
# /var/run/docker.sock = root on the host). Services are enumerated
# explicitly in apps/homepage/services.yaml, same way Traefik routes
# live in routes.yaml.
#
# Fronted by NAS Traefik: home.w1.lv → http://10.10.5.10:3001. Mgmt VLAN
# only; workloads on prd/dev can't route here.
services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.12.3
    container_name: homepage
    restart: unless-stopped
    ports:
      # Mgmt VLAN bind. Host :3001 clear of every existing service on
      # 10.10.5.10 (:8080 PXE nginx, :4480 meshcentral, :8088 wiki).
      - "10.10.5.10:3001:3000"
    volumes:
      # All Homepage YAMLs (services, bookmarks, widgets, settings, etc.)
      # uploaded by phase apps via _ensure_homepage_config_via_ctx.
      #
      # NOT mounted read-only. Homepage runs a first-boot bootstrap that
      # wants write access to the config dir (creates a .lock marker,
      # may seed missing files). With :ro the bootstrap failed silently
      # and Homepage served its built-in "My First Group" demo config
      # instead of our YAML — not the outcome we wanted.
      #
      # Safety against accidental overwrites: Homepage's bootstrap only
      # seeds a file if it's absent. Our six files (services, bookmarks,
      # widgets, settings, docker, kubernetes) are pre-uploaded by phase
      # apps every run, so they're always present before the container
      # starts (step 2a pre-ordering, same rationale as wiki/nginx.conf).
      - /mnt/tank/system/apps-config/homepage:/app/config
    environment:
      # Required since v1.0 for any host other than localhost — prevents
      # host-header injection. List the hostnames we'll reach this app at.
      - HOMEPAGE_ALLOWED_HOSTS=home.w1.lv,10.10.5.10
      # Log level: info keeps the log small; flip to debug when troubleshooting.
      - LOG_TARGETS=stdout
      # Widget credentials — {{HOMEPAGE_VAR_*}} in services.yaml reads these
      # at render time. Values come from apps/homepage/secrets.sops.yaml
      # (SOPS-encrypted), rendered into this compose by apps._render_compose
      # at phase apps --apply time.
      - HOMEPAGE_VAR_TRUENAS_API_KEY=${HOMEPAGE_VAR_TRUENAS_API_KEY}
      - HOMEPAGE_VAR_MINIO_PRD_ACCESS_KEY=${HOMEPAGE_VAR_MINIO_PRD_ACCESS_KEY}
      - HOMEPAGE_VAR_MINIO_PRD_SECRET_KEY=${HOMEPAGE_VAR_MINIO_PRD_SECRET_KEY}
      - HOMEPAGE_VAR_MINIO_DEV_ACCESS_KEY=${HOMEPAGE_VAR_MINIO_DEV_ACCESS_KEY}
      - HOMEPAGE_VAR_MINIO_DEV_SECRET_KEY=${HOMEPAGE_VAR_MINIO_DEV_SECRET_KEY}
      - HOMEPAGE_VAR_MIKROTIK_USER=${HOMEPAGE_VAR_MIKROTIK_USER}
      - HOMEPAGE_VAR_MIKROTIK_PASS=${HOMEPAGE_VAR_MIKROTIK_PASS}
    # Internal DNS — without these, siteMonitor probes against *.w1.lv
    # hostnames hit NXDOMAIN (container uses Docker's embedded resolver
    # which forwards to /etc/resolv.conf; depending on host resolver
    # order, internal names may not resolve). 10.10.0.1 is MikroTik.
    dns:
      - 10.10.0.1
      - 1.1.1.1
    dns_search:
      - w1.lv
    # Belt-and-braces — static host entries so siteMonitor works even if
    # DNS has a hiccup, and to avoid a container→host→container hairpin
    # for services that live on the same NAS (nas, wiki, minio consoles,
    # PXE, MeshCentral all resolve to 10.10.5.10).
    extra_hosts:
      # Direct infra
      - "nas.w1.lv:10.10.5.10"
      # NAS Traefik (admin-plane fan-out)
      - "traefik-nas.w1.lv:10.10.5.20"
      - "mc.w1.lv:10.10.5.20"
      - "pxe.w1.lv:10.10.5.20"
      - "minio-prd.w1.lv:10.10.5.20"
      - "minio-dev.w1.lv:10.10.5.20"
      - "wiki.w1.lv:10.10.5.20"
      - "home.w1.lv:10.10.5.20"
      # MinIO S3 data plane (direct)
      - "s3-prd.w1.lv:10.10.10.10"
      - "s3-dev.w1.lv:10.10.15.10"
      # MikroTik devices — base-vlan (needs firewall carve-out, see
      # mikrotik-infra/configs/fleet.yaml "accept nas homepage widget to
      # ..." entries in firewall.input + firewall.forward).
      - "router.w1.lv:10.10.0.1"
      - "sw-data.w1.lv:10.10.0.2"
      - "sw-mgmt.w1.lv:10.10.0.3"
      - "wifi.w1.lv:10.10.0.4"
      - "lte.w1.lv:10.10.0.5"
    # Intentionally no `healthcheck:` — the Homepage ghcr.io/gethomepage
    # image doesn't ship wget and is minimal by design. TrueNAS uses the
    # absence of a failing healthcheck as the "running" signal; if we
    # defined one that always fails (wget: not found → exit 127), the app
    # gets marked DEPLOYING forever and may be auto-restarted.
    # Restart policy above handles the "container crashed" case anyway.
    networks:
      - default

networks:
  default:
    driver: bridge
