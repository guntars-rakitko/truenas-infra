# Homepage service catalog — declarative.
# https://gethomepage.dev/configs/services/
#
# Each entry becomes a card. `siteMonitor` does an HTTP probe for up/down
# indicator; no credentials required. `widget:` stanzas that call service
# APIs (MinIO, TrueNAS, Traefik) are intentionally held out of MVP to
# avoid credential plumbing — added in a follow-up pass.
#
# ⚠️ WIKI MIRROR: Adding/removing a service here ALSO requires updating:
#   wiki/docs/architecture/hostnames.md  (admin / data / infra plane tables)
#   wiki/docs/reference/links.md         (dashboards table)

- Infrastructure:
    # ─── MikroTik devices (all 5, REST API via firewall carve-out) ──
    - MikroTik Router:
        icon: mikrotik.png
        href: http://router.w1.lv/
        description: "RB5009 — router / firewall / DHCP / DNS"
        siteMonitor: http://router.w1.lv/
        widget:
          type: mikrotik
          url: http://router.w1.lv
          username: "{{HOMEPAGE_VAR_MIKROTIK_USER}}"
          password: "{{HOMEPAGE_VAR_MIKROTIK_PASS}}"
          # Drop numberOfLeases — noise ("0") on devices that don't
          # serve DHCP (switches, AP, LTE modem). Router still runs
          # DHCP but leases count isn't dashboard-grade info anyway.
          fields: ["uptime", "cpuLoad", "memoryUsed"]

    - Switch (CRS310 — data):
        icon: mikrotik.png
        href: http://sw-data.w1.lv/
        description: "CRS310-8G+2S+ — 2.5G traffic + 10G uplinks"
        siteMonitor: http://sw-data.w1.lv/
        widget:
          type: mikrotik
          url: http://sw-data.w1.lv
          username: "{{HOMEPAGE_VAR_MIKROTIK_USER}}"
          password: "{{HOMEPAGE_VAR_MIKROTIK_PASS}}"
          fields: ["uptime", "cpuLoad", "memoryUsed"]

    - Switch (CRS326 — mgmt):
        icon: mikrotik.png
        href: http://sw-mgmt.w1.lv/
        description: "CRS326-24G-2S+ — 1G mgmt + 10G SFP+"
        siteMonitor: http://sw-mgmt.w1.lv/
        widget:
          type: mikrotik
          url: http://sw-mgmt.w1.lv
          username: "{{HOMEPAGE_VAR_MIKROTIK_USER}}"
          password: "{{HOMEPAGE_VAR_MIKROTIK_PASS}}"
          fields: ["uptime", "cpuLoad", "memoryUsed"]

    - WiFi AP (cAP ax):
        icon: mikrotik.png
        href: http://wifi.w1.lv/
        description: "cAP ax dual-band WiFi 6 (CAP mode)"
        siteMonitor: http://wifi.w1.lv/
        widget:
          type: mikrotik
          url: http://wifi.w1.lv
          username: "{{HOMEPAGE_VAR_MIKROTIK_USER}}"
          password: "{{HOMEPAGE_VAR_MIKROTIK_PASS}}"
          fields: ["uptime", "cpuLoad", "memoryUsed"]

    - LTE Modem (LMT 5G):
        icon: mikrotik.png
        href: http://lte.w1.lv/
        description: "LMT 5G — WAN uplink via BITE Latvia"
        siteMonitor: http://lte.w1.lv/
        widget:
          type: mikrotik
          url: http://lte.w1.lv
          username: "{{HOMEPAGE_VAR_MIKROTIK_USER}}"
          password: "{{HOMEPAGE_VAR_MIKROTIK_PASS}}"
          fields: ["uptime", "cpuLoad", "memoryUsed"]

    # ── K8s nodes (hardware layer via AMT) ──────────────────────
    # 6 ASUS Q170S1 boxes consolidated into one card — each line
    # shows "host: 🟢/🟡/🔴 state · IP". Click-through → amtctl.w1.lv
    # for rich per-node view (hardware info, network, power actions).
    # When actual K8s clusters come up, a separate "Kubernetes" group
    # will handle pod/node/ingress state at the cluster layer.
    - K8s nodes:
        icon: mdi-server-network
        href: https://amtctl.w1.lv/
        description: "6 ASUS Q170S1 (AMT hardware layer)"
        widget:
          type: customapi
          url: http://10.10.5.10:8000/api/summary
          refreshInterval: 15000
          mappings:
            - field: kub-prd-01
              label: kub-prd-01
            - field: kub-prd-02
              label: kub-prd-02
            - field: kub-prd-03
              label: kub-prd-03
            - field: kub-dev-01
              label: kub-dev-01
            - field: kub-dev-02
              label: kub-dev-02
            - field: kub-dev-03
              label: kub-dev-03

    - NAS Traefik:
        icon: traefik.png
        href: https://traefik-nas.w1.lv/dashboard/
        description: "Mgmt-plane reverse proxy"
        # /api/http/routers returns JSON via api@internal — always 200
        # when Traefik is up. /ping would need --ping=true flag in compose;
        # /api works unauthenticated on Traefik v3 dashboards.
        siteMonitor: https://traefik-nas.w1.lv/api/http/routers
        widget:
          type: traefik
          url: https://traefik-nas.w1.lv

    - MeshCentral:
        icon: meshcentral.png
        href: https://mc.w1.lv/
        description: "AMT / KVM management (6 nodes)"
        # Fixed 2026-04-21: config.json now has RedirPort:0 + TlsOffload:true
        # which killed the :4430 bogus redirect. / returns 200 clean.
        siteMonitor: https://mc.w1.lv/

- NAS:
    - TrueNAS:
        icon: truenas-scale.png
        href: https://nas.w1.lv/
        description: "NAS management UI"
        siteMonitor: https://nas.w1.lv/
        widget:
          type: truenas
          url: https://nas.w1.lv
          key: "{{HOMEPAGE_VAR_TRUENAS_API_KEY}}"
          enablePools: true   # show tank pool size + health
          nasType: scale      # TrueNAS SCALE / Community Edition

    - PXE (netboot.xyz):
        icon: netbootxyz.png
        href: https://pxe.w1.lv/
        description: "PXE menu admin + Talos images"
        siteMonitor: https://pxe.w1.lv/

    - Internal Wiki:
        icon: mkdocs.png
        href: https://wiki.w1.lv/
        description: "Homelab + GIKS docs"
        siteMonitor: https://wiki.w1.lv/

- Storage:
    - MinIO prd Console:
        icon: minio.png
        href: https://minio-prd.w1.lv/
        description: "S3 admin — prd (Velero / workloads)"
        siteMonitor: https://minio-prd.w1.lv/
        # No widget: — Homepage v1.12 removed the native `minio` widget
        # type (gethomepage.dev/widgets/services/minio/ returns 404).
        # Live stats would need a customapi widget hitting MinIO's
        # Prometheus endpoint; not worth it until we instrument anyway.

    - MinIO dev Console:
        icon: minio.png
        href: https://minio-dev.w1.lv/
        description: "S3 admin — dev"
        siteMonitor: https://minio-dev.w1.lv/

    - MinIO prd S3:
        icon: minio.png
        href: "https://s3-prd.w1.lv:9000/"
        description: "S3 API (port 9000, data plane)"
        siteMonitor: "https://s3-prd.w1.lv:9000/minio/health/live"

    - MinIO dev S3:
        icon: minio.png
        href: "https://s3-dev.w1.lv:9000/"
        description: "S3 API (port 9000, data plane)"
        siteMonitor: "https://s3-dev.w1.lv:9000/minio/health/live"

