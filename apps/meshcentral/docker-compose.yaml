services:
  meshcentral:
    image: ghcr.io/ylianst/meshcentral:latest
    container_name: meshcentral
    restart: unless-stopped
    network_mode: bridge
    ports:
      # HTTPS web UI bound to the NAS management VLAN IP only.
      - "10.10.5.10:4430:443"
      # Plain HTTP — used by the installer/agent redirect. Harmless to
      # expose on mgmt VLAN 5 since the router firewall blocks inbound
      # from other VLANs (see mikrotik-infra INPUT chain).
      - "10.10.5.10:4480:80"
    volumes:
      - /mnt/tank/system/apps-config/meshcentral/data:/opt/meshcentral/meshcentral-data
      - /mnt/tank/system/apps-config/meshcentral/backups:/opt/meshcentral/meshcentral-backups
      - /mnt/tank/system/apps-config/meshcentral/files:/opt/meshcentral/meshcentral-files
    environment:
      # Shown in the web UI header + TLS cert SAN.
      - HOSTNAME=meshcentral.nas.home.arpa
      # Let MeshCentral self-sign the TLS cert on first boot. Swap to a
      # real cert (and flip this off) once we have ACME DNS-01 wired up
      # via `phase tls`.
      - USE_SELFSIGNED_CERT=true
      # Required only for the very first run — after the admin signs up
      # (first account = admin by default), flip to false and redeploy.
      - ALLOW_NEW_ACCOUNTS=true

# Purpose: out-of-band KVM via Intel AMT for the K8s nodes on VLAN 5.
# AMT endpoints currently reachable at 10.10.5.11-.16 on ports 16992
# (HTTP SOAP) and 16994 (KVM). MeshCentral is agent-less for AMT — add
# the endpoints under Settings → AMT Scanner, then click an entry to
# launch KVM in-browser.
#
# Why self-hosted and not a laptop app:
#   - Works from any browser on any device on VLAN 5 / WireGuard
#   - Survives laptop reboots
#   - Same lifecycle story as the rest of `phase apps` (GitOps, SOPS,
#     reproducible rebuild)
