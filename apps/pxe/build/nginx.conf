user nbxyz;
worker_processes auto;
pid /var/run/nginx/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # ─── Pure static serving — no proxies, no caching magic ────
        #
        # Every asset referenced by the PXE menus is pre-downloaded
        # to /mnt/tank/system/pxe/http/ on the NAS (bind-mounted here
        # at /srv/http). Curl (in the download script) handles HTTPS
        # + redirects; iPXE never has to.
        #
        # Operator adds a new distro/tool: run pxe-download.sh with
        # the URL, edit the menu to point at the local path, apply.

        root /srv/http;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        sendfile on;
        tcp_nopush on;
        gzip off;

        # One location block handles every URL path. nginx walks
        # /srv/http matching the URI; if a file exists there, serves
        # it. Otherwise 404.
        location / {
            try_files $uri $uri/ =404;
        }
    }
}
