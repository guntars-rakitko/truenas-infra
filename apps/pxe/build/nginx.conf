user nbxyz;
worker_processes auto;
pid /var/run/nginx/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # /srv/http is bind-mounted from the NAS at
        # /mnt/tank/system/pxe/http — holds cached distro kernels,
        # initrds, squashfs images, bios-apply.img, etc.
        root /srv/http;
        autoindex on;                  # directory listing for browsing
        autoindex_exact_size off;
        autoindex_localtime on;

        # Large-file serving — disable buffering, let the client stream.
        # Ubuntu live ISOs are multi-GB; don't eat RAM on the NAS.
        sendfile on;
        tcp_nopush on;
        gzip off;                      # assets are already compressed

        # CORS-allow the browsable index — no privileged content here.
        add_header Cache-Control "public, max-age=3600";

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
