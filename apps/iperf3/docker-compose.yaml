    command: ["-s", "-V", "-p", "5214"]

  iperf3-data-05:
    image: networkstatic/iperf3:latest
    container_name: iperf3-data-05
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "10.10.15.10:5215:5215/tcp"
      - "10.10.15.10:5215:5215/udp"
    command: ["-s", "-V", "-p", "5215"]

  iperf3-data-06:
    image: networkstatic/iperf3:latest
    container_name: iperf3-data-06
    restart: unless-stopped
    network_mode: bridge
