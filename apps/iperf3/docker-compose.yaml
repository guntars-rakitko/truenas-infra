services:
  # Per-node iperf3 servers — 12 daemons, one port per (node, NIC-family).
  #
  # Why 12 and not 2 (mgmt + data):
  #
  # iperf3 -s accepts ONE client at a time; a second concurrent client gets
  # "the server is busy running a test. try again later" and the run fails.
  # For SINGLE-NODE burnin that's fine — we used to ship one iperf3-mgmt
  # (:5201) and one iperf3-data (:5202) and they handled net-mgmt + net-data
  # on the same node concurrently because they were on different ports.
  #
  # For FLEET burnin (all 6 nodes hitting `burnin` simultaneously) that's
  # broken: 6 clients → 1 server = 5 rejected. So we run one iperf3 -s
  # process per (node, NIC-family) and the client in hw-validation derives
  # its port from hostname:
  #
  #   node        mgmt port (I219-LM, 1Gb, VLAN 5)   data port (I226-V, 2.5Gb, VLAN 10/15)
  #   kub-prd-01  10.10.5.10:5201                    10.10.10.10:5211
  #   kub-prd-02  10.10.5.10:5202                    10.10.10.10:5212
  #   kub-prd-03  10.10.5.10:5203                    10.10.10.10:5213
  #   kub-dev-01  10.10.5.10:5204                    10.10.15.10:5214
  #   kub-dev-02  10.10.5.10:5205                    10.10.15.10:5215
  #   kub-dev-03  10.10.5.10:5206                    10.10.15.10:5216
  #
  # The mapping lives in hw-validation's scripts/tests/net-mgmt.sh and
  # scripts/tests/net-data.sh (case statement on `hostname`). Unknown
  # hostnames fall back to offset 1 — single-node use works transparently,
  # two unknown nodes concurrently would re-collide (documented, rare).
  #
  # Resource cost: each idle iperf3 -s is <1 MB RSS, 0% CPU. 12 of them is
  # still <15 MB RSS total and invisible on `docker stats`. Starts once
  # with TrueNAS, never touched.
  #
  # NAS uplink is 2.5 Gb shared → under 6-way concurrent burnin, each
  # client measures ~400 Mbps mgmt (1 Gb nominal) and ~400 Mbps data
  # (2.5 Gb nominal). Tests COMPLETE; numbers are contended but a dead
  # NIC still shows 0, a 100 Mb-negotiated link still shows ~95 Mbps,
  # so the pass/fail signal remains valid. Fleet-burnin network numbers
  # are pessimistic vs solo-node runs — document on dashboard readings.

  # ─── Mgmt VLAN (I219-LM clients, VLAN 5, 10.10.5.0/24) ───────────────
  iperf3-mgmt-01:
    image: networkstatic/iperf3:latest
    container_name: iperf3-mgmt-01
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "10.10.5.10:5201:5201/tcp"
      - "10.10.5.10:5201:5201/udp"
    command: ["-s", "-V", "-p", "5201"]

  iperf3-mgmt-02:
    image: networkstatic/iperf3:latest
    container_name: iperf3-mgmt-02
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "10.10.5.10:5202:5202/tcp"
      - "10.10.5.10:5202:5202/udp"
    command: ["-s", "-V", "-p", "5202"]

  iperf3-mgmt-03:
    image: networkstatic/iperf3:latest
    container_name: iperf3-mgmt-03
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "10.10.5.10:5203:5203/tcp"
      - "10.10.5.10:5203:5203/udp"
    command: ["-s", "-V", "-p", "5203"]

  iperf3-mgmt-04:
    image: networkstatic/iperf3:latest
    container_name: iperf3-mgmt-04
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "10.10.5.10:5204:5204/tcp"
      - "10.10.5.10:5204:5204/udp"
    command: ["-s", "-V", "-p", "5204"]

  iperf3-mgmt-05:
    image: networkstatic/iperf3:latest
    container_name: iperf3-mgmt-05
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "10.10.5.10:5205:5205/tcp"
      - "10.10.5.10:5205:5205/udp"
    command: ["-s", "-V", "-p", "5205"]

  iperf3-mgmt-06:
    image: networkstatic/iperf3:latest
    container_name: iperf3-mgmt-06
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "10.10.5.10:5206:5206/tcp"
      - "10.10.5.10:5206:5206/udp"
    command: ["-s", "-V", "-p", "5206"]

  # ─── Data VLAN 10 prd (I226-V clients, VLAN 10, 10.10.10.0/24) ───────
  # Bound on the NAS prd-VLAN IP only — dev nodes can't reach
  # 10.10.10.0/24 by L2 and shouldn't be routed inter-VLAN for this.
  iperf3-data-01:
    image: networkstatic/iperf3:latest
    container_name: iperf3-data-01
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "10.10.10.10:5211:5211/tcp"
      - "10.10.10.10:5211:5211/udp"
    command: ["-s", "-V", "-p", "5211"]

  iperf3-data-02:
    image: networkstatic/iperf3:latest
    container_name: iperf3-data-02
    restart: unless-stopped
    network_mode: bridge
    ports:
