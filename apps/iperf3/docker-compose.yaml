services:
  # Two parallel iperf3 server daemons on distinct ports so that Phase D
  # burnin — which runs net-mgmt and net-data concurrently on the same
  # node — doesn't collide on a single iperf3 -s process.
  #
  # iperf3 servers accept ONE client at a time; a second concurrent client
  # gets "the server is busy running a test. try again later" and the
  # run fails. Splitting by port keeps the two NIC tests independent.
  #
  #   :5201  — mgmt VLAN 5  (I219-LM clients via net-mgmt.sh)
  #   :5202  — data VLANs 10+15 (I226-V clients via net-data.sh)
  #
  # Both images are the tiny ~10 MB networkstatic/iperf3 (Alpine + iperf3
  # from main repo). networkstatic/iperf3's entrypoint is `iperf3`, so
  # `command:` below is just its argv.

  iperf3-mgmt:
    image: networkstatic/iperf3:latest
    container_name: iperf3-mgmt
    restart: unless-stopped
    network_mode: bridge
    # Bind on the mgmt-VLAN NAS IP only. Other VLANs have their own
    # daemon (iperf3-data) so we don't accidentally allow a data-NIC
    # client to hit this server via the wrong route.
    ports:
      - "10.10.5.10:5201:5201/tcp"
      - "10.10.5.10:5201:5201/udp"
    # -s server, -V verbose ("docker logs iperf3-mgmt" shows connecting
    # clients for debug), -p pin to 5201 (also the default, but explicit
    # so the two services document their role).
    command: ["-s", "-V", "-p", "5201"]

  iperf3-data:
    image: networkstatic/iperf3:latest
    container_name: iperf3-data
    restart: unless-stopped
    network_mode: bridge
    # Bind on BOTH data-VLAN NAS IPs. prd nodes (kub-prd-*) land on
    # 10.10.10.0/24 and hit 10.10.10.10:5202; dev nodes (kub-dev-*) land
    # on 10.10.15.0/24 and hit 10.10.15.10:5202. net-data.sh auto-picks
    # the right IP from its own DHCP subnet.
    ports:
      - "10.10.10.10:5202:5202/tcp"
      - "10.10.10.10:5202:5202/udp"
      - "10.10.15.10:5202:5202/tcp"
      - "10.10.15.10:5202:5202/udp"
    command: ["-s", "-V", "-p", "5202"]

# Why always-on + split by port (vs one-shot per test run, or single
# daemon with client queueing):
#
#   * No operator pairing dance — any node can boot net-mgmt/net-data
#     anytime and just work.
#   * Phase D burnin runs net-mgmt + net-data concurrently on the same
#     node. A single iperf3 -s would reject the second client ("server
#     is busy") — observed on the first burnin dry-run. Two servers on
#     two ports removes the collision without any client-side retry
#     logic.
#   * NAS sits on a 2.5 Gb link to the switch. Saturating both NIC
#     tests (1 Gb mgmt + 2.5 Gb data = 3.5 Gb theoretical) would
#     exceed NAS uplink; in practice burnin is a stress test, not a
#     throughput benchmark, so some contention is acceptable and
#     documented as expected drift in the fleet matrix.
#   * Idle iperf3 -s consumes <1 MB RSS, 0% CPU — two of them is still
#     negligible. Starts once, never touched.
#
# Only node that's NOT a test target: the NAS itself. Everything else
# in the fleet (the 6 K8s nodes) uses these services.
