# Declarative share config.
# Consumed by modules/shares.py.
#
# NFS/SMB in TrueNAS 25.10 have service-wide bindip only; we layer per-share
# CIDR ACLs for defence in depth.

nfs:
  service:
    enable: true
    # Service listens on prd data, dev data, AND mgmt sub-iface IPs.
    # Mgmt (10.10.5.10) is added so the hw-validation PXE image can
    # drop report.json on stress-results even when NIC2 (I226-V) is
    # broken — NIC2 is itself one of the validation subjects, so the
    # report-delivery path must not depend on it.
    bindip:
      - 10.10.5.10
      - 10.10.10.10
      - 10.10.15.10
  shares:
    # ─── DEPRECATED 2026-04-27 ─────────────────────────────────────
    # The longhorn-{prd,dev} NFS exports are no longer used:
    # Longhorn switched to MinIO S3 BackupTarget on the same NAS
    # (kube-infra commit aa12172, closes kube-infra issue #26).
    #
    # Bucket `longhorn` lives under the existing MinIO instance
    # (s3-{prd,dev}.w1.lv:9000) — single backup-destination story
    # for both Velero (cluster state) and Longhorn (volume data).
    #
    # The two share entries are removed here, but the NAS-side
    # state remains until the operator manually:
    #   1. Verifies Longhorn S3 backups work (kubectl get
    #      backuptarget -n longhorn-system → Available=true) and at
    #      least one Backup CR completes successfully.
    #   2. Deletes the NFS exports via TrueNAS UI (System > Shares >
    #      NFS) — `manage.sh phase shares` is additive-only and
    #      won't prune removed entries.
    #   3. (Optional) Retains the datasets `tank/kube/{prd,dev}/
    #      longhorn` for one rotation cycle as escape hatch, then
    #      deletes them via TrueNAS UI (or remove from
    #      config/storage.yaml + add a destructive cleanup module).
    #
    # Once the NAS-side cleanup is complete, this comment block can
    # be removed too.
    - name: stress-results
      path: /mnt/tank/system/stress-results
      networks: [10.10.5.0/24]
      # hw-validation runs as root in a netboot live shell. Initially
      # mapped to nobody/nogroup as a cosmetic preference, but the
      # dataset's default ownership (root:wheel, mode 0755) then rejects
      # writes with EACCES — the declarative datasets module has no
      # owner/mode field to paper over it. Map root → root instead; the
      # mgmt-VLAN ACL (10.10.5.0/24 only) is our security boundary per
      # the hw-validation plan's non-goal #4 (same posture as longhorn-*
      # exports). Reports land as root, which is fine for read-only
      # consumption by a future dashboard.
      maproot_user: root
      maproot_group: wheel

smb:
  service:
    enable: true
    bindip: [10.10.20.10]
    # Workgroup / server name; tune later.
    workgroup: HOME
    server_string: "NAS01"
  shares:
    - name: general
      path: /mnt/tank/shared/general
      purpose: DEFAULT_SHARE
      browsable: true
      # Note: TrueNAS 25.10 removed per-share hostsallow/guestok from the
      # sharing.smb.create schema. Per-VLAN isolation is enforced by
      # smb.service.bindip (above) — SMB only listens on VLAN 20.

ssh:
  enable: true
  # Password auth only during bring-up; phase `users` will install SSH keys
  # and flip this to false.
  password_auth: true
  bindip: [10.10.5.10]
