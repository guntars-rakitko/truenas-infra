services:
  meshcentral:
    image: ghcr.io/ylianst/meshcentral:latest
    container_name: meshcentral
    restart: unless-stopped
    network_mode: bridge
    # MeshCentral now serves plain HTTP internally on :4480. Traefik
    # fronts it at https://mc.w1.lv/ (rules in apps/traefik/routes.yaml)
    # and terminates TLS using the wildcard *.w1.lv cert. We drop the
    # old :4430 HTTPS port + USE_SELFSIGNED_CERT — TrueNAS's ACME cert
    # lives with Traefik, not here.
    ports:
      - "10.10.5.10:4480:80"      # HTTP backend for Traefik → this container
    volumes:
      - /mnt/tank/system/apps-config/meshcentral/data:/opt/meshcentral/meshcentral-data
      - /mnt/tank/system/apps-config/meshcentral/backups:/opt/meshcentral/meshcentral-backups
      - /mnt/tank/system/apps-config/meshcentral/files:/opt/meshcentral/meshcentral-files
    environment:
      - HOSTNAME=mc.w1.lv
      - ALLOW_NEW_ACCOUNTS=false
# NOTE: MeshCentral is fronted by Traefik at https://mc.w1.lv/ — it
# runs plain HTTP internally. `TlsOffload: true` + `Cert: mc.w1.lv` in
# meshcentral-data/config.json tells it "you're behind a proxy"; see
# apps/meshcentral/config.json (also uploaded by phase apps).
#
# Purpose unchanged: out-of-band KVM via Intel AMT for the K8s nodes.
# AMT endpoints kub-{prd,dev}-0{1,2,3}.w1.lv resolve on the mgmt VLAN
# (see config/dns.yaml). Add via MeshCentral's Intel AMT pane, then
# click → Remote Desktop for browser KVM.
