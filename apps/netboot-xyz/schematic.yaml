# Talos Linux factory schematic — defines what extensions are baked into
# the kernel + initramfs images for our K8s node bring-up.
#
# Sent to https://factory.talos.dev/schematics to receive a schematic ID;
# that ID is then used to fetch vmlinuz / initramfs from pxe.factory.talos.dev.
#
# Docs: https://factory.talos.dev/docs/#/configuration

customization:
  systemExtensions:
    officialExtensions:
      # Graceful shutdown on UPS events (NUT client on each K8s node, paired
      # with the NUT server running on this NAS at 10.10.5.10:3493).
      - siderolabs/nut-client
      # Intel microcode updates — the ASUS Q170S1 nodes are all Intel, and
      # microcode errata fixes matter for reliability under load.
      - siderolabs/intel-ucode
      # gVisor — userland sandbox; enables runsc as a container runtime
      # option for stricter workload isolation alongside standard runc.
      - siderolabs/gvisor
