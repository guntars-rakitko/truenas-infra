user nbxyz;
worker_processes auto;
pid /var/run/nginx/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    resolver 10.10.0.1 valid=300s;  # MikroTik for upstream DNS

    # ─── Proxy cache ────────────────────────────────────────────────
    #
    # Lazy cache of upstream distro + utility assets. First request for
    # a given URL downloads from upstream and stores a copy under
    # /srv/cache/pxe; subsequent requests serve from cache at LAN speed.
    # Entries not accessed in 30 days are evicted. Hard cap: 80 GB
    # (tunable — raise if you cache many live ISOs).
    #
    # /srv/cache/pxe is bind-mounted from the NAS at
    # /mnt/tank/system/pxe/cache so the cache survives container
    # restarts and image rebuilds.
    proxy_cache_path /srv/cache/pxe
        levels=1:2
        keys_zone=pxe:100m
        max_size=80g
        inactive=30d
        use_temp_path=off;

    # Timeouts tuned for slow-start giant ISOs (multi-GB live CDs).
    proxy_connect_timeout 30s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
    proxy_buffering on;
    proxy_buffer_size 32k;
    proxy_buffers 16 32k;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Cache status header — useful for debugging "is iPXE hitting
        # nginx's cache or going to the origin?". Visible in curl -I.
        add_header X-Cache-Status $upstream_cache_status always;

        # ─── Local-only assets (not proxied) ────────────────────────
        #
        # Things that only exist on our NAS: bios-apply.img, the
        # talos-updater-generated talos-menu.ipxe, and the per-version
        # Talos kernel+initramfs.
        location /bios-config/ {
            alias /srv/http/bios-config/;
            autoindex on;
        }
        location /talos/ {
            alias /srv/http/talos/;
            autoindex on;
        }
        location = /talos-menu.ipxe {
            alias /srv/http/talos-menu.ipxe;
        }

        # ─── Utilities (cached proxies) ────────────────────────────

        # Memtest86+ — github release, always latest
        location /memtest/ {
            proxy_pass https://github.com/memtest86plus/memtest86plus/releases/latest/download/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_cache_valid any 1m;
            proxy_cache_key $scheme$proxy_host$request_uri;
            proxy_set_header Host github.com;
            proxy_ssl_server_name on;
            # github redirects to objects.githubusercontent.com
            proxy_intercept_errors off;
            proxy_redirect off;
        }

        # UEFI Shell from TianoCore EDK2
        location /uefishell/ {
            proxy_pass https://github.com/tianocore/edk2/raw/edk2-stable202408/ShellBinPkg/UefiShell/X64/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host github.com;
            proxy_ssl_server_name on;
        }

        # ZFSBootMenu — github release
        location /zbm/ {
            proxy_pass https://github.com/zbm-dev/zfsbootmenu/releases/latest/download/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host github.com;
            proxy_ssl_server_name on;
        }

        # GParted Live ISOs — sourceforge
        location /gparted/ {
            proxy_pass https://downloads.sourceforge.net/gparted/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host downloads.sourceforge.net;
            proxy_ssl_server_name on;
        }

        # SystemRescue — sourceforge-hosted ISOs
        location /sysresc/ {
            proxy_pass https://sourceforge.net/projects/systemrescuecd/files/sysresccd-x86/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host sourceforge.net;
            proxy_ssl_server_name on;
        }

        # ─── Linux network installers (cached proxies) ─────────────

        # Ubuntu archive — kernels + initrds for netboot installs
        location /ubuntu/ {
            proxy_pass http://archive.ubuntu.com/ubuntu/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host archive.ubuntu.com;
        }

        # Ubuntu releases — live ISO images
        location /ubuntu-live/ {
            proxy_pass https://releases.ubuntu.com/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host releases.ubuntu.com;
            proxy_ssl_server_name on;
        }

        # Debian archive — netinst kernels + initrds
        location /debian/ {
            proxy_pass http://deb.debian.org/debian/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host deb.debian.org;
        }

        # Debian live ISOs
        location /debian-live/ {
            proxy_pass https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host cdimage.debian.org;
            proxy_ssl_server_name on;
        }

        # ─── Catch-all default: serve /srv/http with autoindex ─────
        #
        # Useful for "let me browse what's currently cached" from a
        # browser. Kept last so the proxy-locations above take priority.
        location / {
            root /srv/http;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }
    }
}
