#!ipxe
# Homelab PXE runtime variables.
#
# Loaded by menu.ipxe first thing (via `chain tftp://10.10.5.10/boot.cfg`).
# Sets display branding and the HTTP endpoint for cached distro assets.
#
# Kept deliberately short — unlike the old netboot.xyz boot.cfg, we
# don't need mirror URLs or menu_* toggles here because our sub-menus
# embed their asset URLs directly (and everything is served from our
# own nginx, not from a dozen distro mirrors).

set site_name Homelab

# Root URL for cached assets — our nginx on port 80 (bound to the
# mgmt VLAN IP via compose; host port 8080 → container :80). Menus
# reference this for kernel/initrd fetches.
set cache_url http://10.10.5.10:8080

# Signature verification — disabled. Our trust boundary is the NAS
# itself (we served the menu + binaries). There's no upstream .sig
# file to validate against, and we don't need to re-verify our own
# NAS-served assets.
set sigs_enabled false
