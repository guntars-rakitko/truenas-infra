# Homepage top-bar info widgets.
# https://gethomepage.dev/configs/service-widgets/
#
# Keeping this MVP-minimal. The `resources` widget (CPU/memory/disk from
# inside the container) is intentionally NOT enabled — it reads the
# systeminformation npm lib against /proc in the container, which reports
# container-scoped numbers that don't match operator expectations and
# produces frequent "API Error" renders on certain kernel / mount combos.
# Real NAS host stats come from the TrueNAS widget (service-level, once
# we plumb the API key — follow-up).

- datetime:
    text_size: xl
    format:
      timeStyle: short
      dateStyle: short
      hour12: false

- search:
    provider: custom
    url: https://wiki.w1.lv/?q=
    target: _blank
