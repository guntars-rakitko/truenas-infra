user nbxyz;
worker_processes auto;
pid /var/run/nginx/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    resolver 10.10.0.1 valid=300s;  # MikroTik for upstream DNS

    # ─── Proxy cache ────────────────────────────────────────────────
    #
    # Lazy cache of upstream distro + utility assets. First request for
    # a given URL downloads from upstream and stores a copy under
    # /srv/cache/pxe; subsequent requests serve from cache at LAN speed.
    # Entries not accessed in 30 days are evicted. Hard cap: 80 GB
    # (tunable — raise if you cache many live ISOs).
    #
    # /srv/cache/pxe is bind-mounted from the NAS at
    # /mnt/tank/system/pxe/cache so the cache survives container
    # restarts and image rebuilds.
    proxy_cache_path /srv/cache/pxe
        levels=1:2
        keys_zone=pxe:100m
        max_size=80g
        inactive=30d
        use_temp_path=off;

    # Timeouts tuned for slow-start giant ISOs (multi-GB live CDs).
    proxy_connect_timeout 30s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
    proxy_buffering on;
    proxy_buffer_size 32k;
    proxy_buffers 16 32k;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Cache status header — useful for debugging "is iPXE hitting
        # nginx's cache or going to the origin?". Visible in curl -I.
        add_header X-Cache-Status $upstream_cache_status always;

        # ─── Local-only assets (not proxied) ────────────────────────
        #
        # Things that only exist on our NAS: bios-apply.img, the
        # talos-updater-generated talos-menu.ipxe, and the per-version
        # Talos kernel+initramfs.
        location /bios-config/ {
            alias /srv/http/bios-config/;
            autoindex on;
        }
        location /talos/ {
            alias /srv/http/talos/;
            autoindex on;
        }
        location = /talos-menu.ipxe {
            alias /srv/http/talos-menu.ipxe;
        }

        # ─── Utilities (cached proxies) ────────────────────────────

        # memtest86+ — NOT proxied. memtest86plus v8.00 publishes NO
        # release assets (only zipped binaries at memtest.org), so we
        # extract the .efi at Docker image build time (see Dockerfile
        # stage memtest-extractor) and serve it straight from /srv/tftp.
        # Bump MEMTEST_VERSION build arg in the Dockerfile to update.

        # UEFI Shell from TianoCore EDK2
        location /uefishell/ {
            proxy_pass https://github.com/tianocore/edk2/raw/edk2-stable202408/ShellBinPkg/UefiShell/X64/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host github.com;
            proxy_ssl_server_name on;
        }

        # ZFSBootMenu — github release. Pinned version because upstream
        # ships versioned filenames (zfsbootmenu-recovery-x86_64-vX.Y-
        # linuxZ.W.EFI). No generic `/latest/` name exists.
        location /zbm/ {
            proxy_pass https://github.com/zbm-dev/zfsbootmenu/releases/download/v3.1.0/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host github.com;
            proxy_ssl_server_name on;
        }

        # SourceForge canonical URL pattern:
        #   https://downloads.sourceforge.net/project/<project>/<path>
        # The `/project/` prefix IS required (the shortcut
        # downloads.sourceforge.net/<project>/ form only works for a
        # few top-tier projects — gparted + supergrub2 both 404 under
        # it, systemrescuecd + clonezilla happen to work under both).
        # Standardise on /project/ for reliability.

        # GParted Live ISOs
        location /gparted/ {
            proxy_pass https://downloads.sourceforge.net/project/gparted/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host downloads.sourceforge.net;
            proxy_ssl_server_name on;
        }

        # SystemRescue
        location /sysresc/ {
            proxy_pass https://downloads.sourceforge.net/project/systemrescuecd/sysresccd-x86/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host downloads.sourceforge.net;
            proxy_ssl_server_name on;
        }

        # Clonezilla Live
        location /clonezilla/ {
            proxy_pass https://downloads.sourceforge.net/project/clonezilla/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host downloads.sourceforge.net;
            proxy_ssl_server_name on;
        }

        # ShredOS — github release
        location /shredos/ {
            proxy_pass https://github.com/PartialVolume/shredos.x86_64/releases/download/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host github.com;
            proxy_ssl_server_name on;
        }

        # Super Grub2 Disk — REMOVED. Upstream 2.06s4 publishes ONLY
        # zipped variants (no plain ISO), and iPXE can't unzip. Until
        # the maintainers ship direct ISOs again (or we extract at
        # build time), this tool is not available from our menu.

        # ─── Linux network installers (cached proxies) ─────────────

        # Ubuntu archive — kernels + initrds for netboot installs
        location /ubuntu/ {
            proxy_pass http://archive.ubuntu.com/ubuntu/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host archive.ubuntu.com;
        }

        # Ubuntu releases — live ISO images
        location /ubuntu-live/ {
            proxy_pass https://releases.ubuntu.com/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host releases.ubuntu.com;
            proxy_ssl_server_name on;
        }

        # Debian archive — netinst kernels + initrds
        location /debian/ {
            proxy_pass http://deb.debian.org/debian/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host deb.debian.org;
        }

        # Debian live ISOs
        location /debian-live/ {
            proxy_pass https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host cdimage.debian.org;
            proxy_ssl_server_name on;
        }

        # Alpine Linux — netboot kernel + initrd + modloop
        location /alpine/ {
            proxy_pass http://dl-cdn.alpinelinux.org/alpine/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host dl-cdn.alpinelinux.org;
        }

        # Proxmox VE installer ISO
        location /proxmox/ {
            proxy_pass https://enterprise.proxmox.com/iso/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host enterprise.proxmox.com;
            proxy_ssl_server_name on;
        }

        # TrueNAS SCALE installer ISO
        location /truenas/ {
            proxy_pass https://download.truenas.com/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host download.truenas.com;
            proxy_ssl_server_name on;
        }

        # Tails (privacy-focused live distro) ISO — note: requires
        # signature verification for real security-critical use; we
        # serve the ISO here for convenience + homelab use, not for
        # high-stakes threat models.
        location /tails/ {
            proxy_pass https://download.tails.net/tails/stable/;
            proxy_cache pxe;
            proxy_cache_valid 200 30d;
            proxy_set_header Host download.tails.net;
            proxy_ssl_server_name on;
        }

        # ─── Catch-all default: serve /srv/http with autoindex ─────
        #
        # Useful for "let me browse what's currently cached" from a
        # browser. Kept last so the proxy-locations above take priority.
        location / {
            root /srv/http;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }
    }
}
