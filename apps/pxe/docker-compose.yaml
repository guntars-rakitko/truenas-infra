services:
  pxe:
    container_name: pxe
    restart: unless-stopped
    # HOST networking (not bridge) — critical for TFTP.
    #
    # Why: TFTP (UDP) replies must originate from the same IP the
    # client sent the original query to (10.10.5.10), otherwise the
    # client rejects with "received packet from wrong source". With
    # Docker's default bridge + MASQUERADE, UDP replies can be
    # rewritten with a different NAS sub-interface IP on a multi-
    # homed host — our NAS has 4 IPs (mgmt/prd/dev/home), and the
    # kernel routing + Docker SNAT combined don't reliably pick
    # 10.10.5.10 as the reply source.
    #
    # Host networking bypasses Docker's port NAT entirely. dnsmasq
    # and nginx now bind directly to NAS's network stack — we pin
    # them to 10.10.5.10 explicitly (see build/entrypoint.sh for
    # dnsmasq --listen-address, and build/nginx.conf listen directive).
    # This also avoids port :80 collision with Traefik on 10.10.5.20
    # (each service binds to its own host IP).
    network_mode: host
    # Build context lives on the NAS at the path below (uploaded by
    # `phase apps --apply`). First start takes ~5 min to clone iPXE
    # + compile; subsequent starts use Docker layer cache.
    #
    # `pull_policy: build` forces docker-compose to skip the pre-pull
    # step — without it, compose treats `image:` as "pull this first"
    # and fails because the tag isn't on any registry (it's local).
    build:
      context: /mnt/tank/system/apps-config/pxe/build
      dockerfile: Dockerfile
    image: homelab-pxe:latest
    pull_policy: build
    # No `ports:` section with network_mode=host — ports are determined
    # by what dnsmasq + nginx bind to inside the container (directly on
    # host network stack). TFTP :69/udp + HTTP :8080/tcp, both bound to
    # 10.10.5.10 only.
    volumes:
      # TFTP root — our menu tree (uploaded by phase apps --apply) plus
      # the image-baked iPXE binary (written here by entrypoint.sh on
      # each container start). Must be rw so the entrypoint's install
      # of ipxe.efi can write; menu files are treated as read-only by
      # the container (our stack only reads from /srv/tftp).
      - /mnt/tank/system/pxe/tftp:/srv/tftp:rw
      # Local-only HTTP assets — bios-apply.img, talos kernel+initramfs,
      # talos-menu.ipxe. NOT upstream-mirrored; produced by sibling
      # jobs (bios-config build, talos-updater cronjob). Read-only.
      - /mnt/tank/system/pxe/http:/srv/http:ro
      # nginx proxy-cache storage — LAZY CACHE of upstream distro +
      # utility downloads. First request for a given URL goes to
      # upstream (internet speed); nginx stores a copy here and
      # subsequent requests serve from cache at LAN speed. Entries
      # evicted after 30 days of non-use; hard cap 80 GB.
      # Must be rw — nginx writes cached responses here.
      - /mnt/tank/system/pxe/cache:/srv/cache/pxe:rw
