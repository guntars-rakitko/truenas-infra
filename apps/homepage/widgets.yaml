# Homepage top-bar info widgets.
# https://gethomepage.dev/configs/service-widgets/

# Container CPU + memory from /proc inside the homepage container.
# Kept narrow — CPU and memory only, no `disk:` because the container's
# filesystem view (post-bind-mount) produces numbers that don't match
# NAS pool reality. Real NAS pool stats come from the TrueNAS widget on
# the NAS card below.
- resources:
    label: Host
    cpu: true
    memory: true
    expanded: true

- datetime:
    text_size: xl
    format:
      timeStyle: short
      dateStyle: short
      hour12: false

- search:
    provider: custom
    url: https://wiki.w1.lv/?q=
    target: _blank
