# Canonical AMT state for the 6-node homelab Kubernetes fleet.
#
# Applied by tools/amt_fleet_apply.py — safe to re-run anytime, writes
# are idempotent (Put semantics: read-modify-write; no-op if matching).
# After applying, tools/amt_fleet_audit.py should show zero drift.
#
# This file is the source of truth for fleet-wide AMT identity + KVM
# behaviour. Per-node variance (HostName) is derived from
# apps/amtctl/nodes.yaml at apply time.
#
# Batches committed incrementally:
#   Batch 1: AMT_GeneralSettings + time sync
#   Batch 3: IPS_KVMRedirectionSettingData  (Batch 2 Ethernet skipped —
#            already uniform on all 6 nodes, no known default drift
#            source; can add if future board replacement reveals drift)

# ─── Per-class canonical overlays (Put targets) ─────────────────────────

classes:

  # ── Batch 1: Identity + general behaviour ──
  - name: AMT_GeneralSettings
    uri: http://intel.com/wbem/wscim/1/amt-schema/1/AMT_GeneralSettings
    # When true, auto-inject HostName = node name from nodes.yaml.
    per_node_hostname: true
    fields:
      # Fleet-wide identity
      DomainName: "w1.lv"
      SharedFQDN: "true"
      WsmanOnlyMode: "false"
      # NOTE: HostOSFQDN is NOT managed here — Intel AMT rejects writes
      # to this field via remote WS-MAN (it's only writable by LMS, the
      # OS-side agent, which Talos doesn't have). prd-01 has a stale
      # "dev-srv-03.w1.lv" from a prior OS; harmless but not fixable
      # remotely. Effective AMT FQDN resolves correctly via
      # HostName + DomainName + SharedFQDN=true.

      # DDNS — MikroTik owns DNS with static records. No AMT updates.
      DDNSUpdateEnabled: "false"
      DDNSUpdateByDHCPServerEnabled: "true"  # harmless; DHCP server doesn't DDNS
      DDNSPeriodicUpdateInterval: "1440"     # standard, 24h
      DDNSTTL: "900"                          # standard, 15 min

      # LAN reachability probes — useful for health monitoring.
      PingResponseEnabled: "true"
      RmcpPingResponseEnabled: "true"

      # AMT network stack — must be on for KVM/SOL.
      NetworkInterfaceEnabled: "true"
      AMTNetworkEnabled: "1"

      # ME idle-driven wake disabled — we don't use it.
      IdleWakeTimeout: "65535"

      # Standard defaults.
      PrivacyLevel: "0"
      PreferredAddressFamily: "0"            # IPv4-only environment
      PresenceNotificationInterval: "0"       # no 3rd-party AMT manager
      DHCPv6ConfigurationTimeout: "0"         # no DHCPv6 wait

  # ── Batch 2: Ethernet port (wired) ──
  # All 6 nodes already uniform per audit; this class is prophylactic —
  # locks in canonical for future board replacements / RMA units that
  # may arrive with different defaults. DHCP-derived fields (IPAddress,
  # DefaultGateway, PrimaryDNS, SubnetMask, MACAddress) are not listed
  # — they come from MikroTik's DHCP reservation, not from canonical.
  - name: AMT_EthernetPortSettings
    uri: http://intel.com/wbem/wscim/1/amt-schema/1/AMT_EthernetPortSettings
    fields:
      # AMT gets its IP via DHCP from MikroTik (reserved by MAC).
      DHCPEnabled: "true"

      # SharedMAC=true: AMT reuses the I219-LM MAC (single L2 address
      # per physical port — simpler switch ARP tables, matches the
      # intended "transparent AMT on mgmt VLAN" design).
      SharedMAC: "true"

      # SharedDynamicIP=true: AMT shares the DHCP lease with the OS NIC
      # (single IP per port, again transparent).
      SharedDynamicIP: "true"

      # SharedStaticIp=false: paired with SharedDynamicIP=true. Only one
      # of the two can be true; "dynamic" is correct for our DHCP setup.
      SharedStaticIp: "false"

      # IpSyncEnabled=false: we don't want AMT to push its IP config to
      # the OS side. OS gets its own DHCP lease independently.
      IpSyncEnabled: "false"

      # NOTE: LinkPolicy is NOT managed here. It's a uint32[] array
      # (multiple <LinkPolicy> XML elements, each holding a power-state
      # flag) — the current read/write regex in put_singleton treats it
      # as a scalar and would clobber the array on Put. Fleet-wide
      # audit shows current values are fine (WoL path works, KVM
      # reachable across power states). Revisit if array-valued field
      # support gets added to put_singleton.

  # ── Batch 3: KVM redirection settings ──
  - name: IPS_KVMRedirectionSettingData
    uri: http://intel.com/wbem/wscim/1/ips-schema/1/IPS_KVMRedirectionSettingData
    fields:
      # No legacy VNC port — everything goes through AMT KVM (5900 is
      # RFB-over-TLS; we don't expose it).
      Is5900PortEnabled: "false"

      # No user-consent prompt — these are headless servers with no
      # local user to click "allow". OptIn is per-session interactive.
      OptInPolicy: "false"

      # KVM session idle timeout in minutes. Audit found 5 of 6 nodes
      # at AMT default 3min (too short — coffee break disconnects
      # the operator); prd-01 at 120 somehow. Canonical: 120 (2h).
      SessionTimeout: "120"

      # Default screen for multi-monitor hosts. Single-iGPU boards →
      # always 0.
      DefaultScreen: "0"

      # No RFB password. amtctl dashboard uses AMT digest auth, not RFB.
      RFBPassword: ""

# ─── Time sync (method invocation, not Put) ─────────────────────────────
# Invoked on every apply; forces AMT clock to manager UTC. Audit logs
# get real timestamps (discovery found fleet drifted 10-22 years off).
time_sync: true
