#!ipxe
# Homelab overrides for netboot.xyz.
#
# Lands at /mnt/tank/system/pxe/config/menus/boot.cfg via ensure_file_on_nas
# (phase apps). netboot.xyz's menu.ipxe chain-loads this file first thing,
# so anything set here is live for the rest of the menu session.
#
# What this does:
#   * site_name     — decorates the top bar of the menu UI.
#   * custom_url    — tells menu.ipxe to surface the "Custom URL Menu"
#                     item in the main menu. Clicking that item chains
#                     ${custom_url}/custom.ipxe, which we serve from the
#                     netboot.xyz container's HTTP asset port (8080).
#
# Why not override netboot.xyz's own /config/menus/remote/talos.ipxe:
# the container's init.sh re-extracts the menus tarball on every start
# if /config/menus/remote/menu.ipxe is absent, which would stomp any file
# we drop in there. /assets is our volume and isn't touched.

set site_name Homelab
set custom_url http://10.10.5.10:8080

# Tell iPXE where to load netboot.xyz's own menus (Linux Installs,
# Utilities, Live CDs, BSDs, etc.). Default is `boot.netboot.xyz`
# baked into the upstream boot.cfg — when we override the whole
# boot.cfg with our own minimal version we lose that default and iPXE
# falls back to "load relative to wherever the current menu came from"
# = our NAS nginx on :8080, which only serves /assets (no /menus/…).
# Result: every non-Custom menu (incl. Utilities) returns 404 and iPXE
# surfaces it as "permission denied". Fix: restore the upstream value.
set boot_domain boot.netboot.xyz

# Short-circuit netboot.xyz's built-in self-upgrade check.
#
# After we restored boot_domain (above), menu.ipxe's version probe
# started succeeding where it silently 404'd before — and promptly
# chain-loaded the upstream iPXE 2.0.0 binary, which has a broken xHCI
# USB keyboard driver on Intel platforms (iPXE issue #1643, still
# open upstream). That leaves the menu unnavigable from USB KB on our
# Beelink ME Mini hardware.
#
# We pin the container to MENU_VERSION=2.0.89 on purpose (see
# docker-compose.yaml). The upgrade chain is triggered in menu.ipxe by:
#
#     iseq ${version} ${upstream_version} || chain ... (fetch new iPXE)
#
# where ${upstream_version} comes from version.ipxe on boot_domain and
# is currently "3.x". Setting ${version} here to the same string makes
# the iseq succeed unconditionally, so the chain never fires and the
# baked-in netboot.xyz 2.0.89 iPXE (which works with our USB KB) stays
# in charge for the rest of the session.
#
# When upstream ships a fix for #1643, bump MENU_VERSION to the fixed
# release and remove this line so we track the upgrade flow normally.
set version 3.x
